name: Release (SSH)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build + Test (with coverage)
  # ─────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NurTricenterApiGateway.sln

      - name: Build (Release)
        run: dotnet build NurTricenterApiGateway.sln -c Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test NurTricenterApiGateway.sln \
            --no-build -c Release --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

      - name: Build deploy artifact
        run: |
          git archive --format=tar.gz -o app.tgz HEAD
          test -s app.tgz

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: app.tgz
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: Release
  # Deploys to the production VPS via SSH.
  # Only runs if build job succeeds.
  # ─────────────────────────────────────────────
  release:
    name: Release to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    env:
      APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/nur-tricenter-api-gateway' }}

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact

      - name: Upload artifact to VPS (/tmp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_ROOT }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "app.tgz"
          target: "/tmp"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_ROOT }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR
          script: |
            set -eu
            (set -o pipefail) 2>/dev/null || true

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "[deploy] ERROR: docker compose no está instalado."
              exit 1
            fi

            echo "[deploy] APP_DIR=${APP_DIR}"

            # Stop current containers (if any).
            if [ -f "${APP_DIR}/docker-compose.yml" ]; then
              cd "${APP_DIR}"
              $COMPOSE down || true
            fi

            # Extract code. `.env` is NOT in the tarball (gitignored),
            # so the existing server-side .env is preserved.
            mkdir -p "${APP_DIR}"
            tar -xzf /tmp/app.tgz -C "${APP_DIR}"
            rm -f /tmp/app.tgz

            cd "${APP_DIR}"

            if [ ! -f .env ]; then
              echo "[deploy] ERROR: .env no existe en ${APP_DIR}."
              echo "[deploy] Crealo a partir de .env.example antes del primer deploy."
              exit 1
            fi

            export DOCKER_BUILDKIT=0
            export COMPOSE_DOCKER_CLI_BUILD=0
            $COMPOSE up -d --build
            $COMPOSE ps

      # ── Post-deploy monitoring ─────────────────
      - name: Monitor – container health & recent logs
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_ROOT }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR
          script: |
            set -eu

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            cd "${APP_DIR}"

            echo "══════════════════════════════════════"
            echo " Container status"
            echo "══════════════════════════════════════"
            $COMPOSE ps

            echo ""
            echo "══════════════════════════════════════"
            echo " Gateway reachability (port 5000)"
            echo "══════════════════════════════════════"
            curl -fsS -o /dev/null -w "HTTP %{http_code}\n" http://localhost:5000/ \
              || echo "[monitor] gateway no respondió en :5000."

            echo ""
            echo "══════════════════════════════════════"
            echo " Last 80 log lines (apigateway)"
            echo "══════════════════════════════════════"
            $COMPOSE logs --tail=80 apigateway 2>/dev/null || $COMPOSE logs --tail=80
